<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edutopia - E-Learning Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Include icons (Phosphor Icons for a clean look) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card animate-fade-in">
            <div class="auth-header">
                <i class="ph-fill ph-graduation-cap" style="font-size: 3rem; color: var(--primary); margin-bottom: 0.5rem;"></i>
                <h1>Welcome to Edutopia</h1>
                <p>Sign in to access your dashboard</p>
            </div>

            <form id="loginForm" action="student-dashboard.html">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@university.edu" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-group flex justify-between items-center mt-4 mb-4">
                    <label class="flex items-center gap-2 text-sm text-muted">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="text-sm">Forgot password?</a>
                </div>

                <div class="form-group">
                    <label class="form-label">Role (Demo purposes)</label>
                    <select id="roleSelect" class="form-input">
                        <option value="student">Student</option>
                        <option value="professor">Professor</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-full mt-4" style="padding: 0.75rem; font-size: 1rem;">
                    Sign In
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-sm text-muted">Don't have an account? <a href="#">Contact Admin</a></p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
